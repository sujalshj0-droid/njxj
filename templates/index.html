<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUJAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0a0e14; color:#00ff88; font-family:'Courier New', monospace; }
        .header { background:#161b22; padding:28px; text-align:center; font-size:34px; border-bottom:5px solid #00ff88; animation:breathe 3.5s infinite ease-in-out; box-shadow:0 0 40px rgba(0,255,136,0.6); }
        @keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.88;transform:scale(1.02)} }
        .card { background:rgba(0,255,0,0.07); border:2px solid #00ff88; border-radius:15px; }
        input, textarea { background:#111; color:#00ff88; border:1px solid #00ff88; }
        .console { height:420px; background:#000; border:3px solid #ffcc00; padding:18px; overflow-y:auto; font-size:15px; line-height:1.6; color:#ffcc00; box-shadow:0 0 25px #ffcc00; }
        .btn-start { background:#00ff88; color:#000; font-weight:bold; font-size:22px; padding:16px; box-shadow:0 0 30px #00ff88; transition:all 0.3s; }
        .btn-start:hover { transform:scale(1.06); box-shadow:0 0 50px #00ff88; }
        .btn-stop { background:#ff3366; color:white; font-weight:bold; font-size:22px; padding:16px; }
        .nav-link { color:#00ff88; border-bottom:3px solid transparent; }
        .nav-link.active { color:#ffcc00; border-bottom:3px solid #ffcc00; }
        .status-running { animation:blink 1.3s infinite; }
        @keyframes blink { 50% { opacity:0.5; } }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="header">SUJAL</div>
    <ul class="nav nav-tabs justify-content-center mt-4" id="tabs">
        <li class="nav-item"><a class="nav-link active" onclick="openTab(0)">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" onclick="openTab(1)">Messages</a></li>
        <li class="nav-item"><a class="nav-link" onclick="openTab(2)">Settings</a></li>
    </ul>

    <!-- Dashboard -->
    <div class="tab-content active card p-4 mt-3" id="tab0">
        <div class="text-center mb-4">
            <span id="status" class="badge fs-3 px-5 py-3">STOPPED</span>
        </div>
        <div class="d-grid gap-3">
            <button onclick="startBomb()" class="btn btn-start">▶ START BOT</button>
            <button onclick="stopBomb()" class="btn btn-stop">⛔ STOP BOT</button>
        </div>
        <div class="mt-4 text-center">
            <small>Sent: <span id="sent" class="fw-bold">0</span> | Uptime: <span id="uptime">00:00:00</span></small>
        </div>
    </div>

    <!-- Messages -->
    <div class="tab-content card p-4 mt-3" id="tab1">
        <form id="form">
            <div class="mb-3">
                <label class="form-label">Session ID (Optional)</label>
                <textarea name="sessionid" class="form-control" rows="2" placeholder="sessionid paste karo"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Thread ID (Specific Group Chat) — Blank chhod do to sab GC mein rotate karega</label>
                <input name="thread_id" type="text" class="form-control" placeholder="117390744240357">
            </div>
            <div class="mb-3">
                <label class="form-label">Messages (Pura spam yahan likho)</label>
                <textarea name="messages" class="form-control" rows="12" placeholder="Apna pura formatted message yahan likho..." required></textarea>
            </div>
        </form>
    </div>

    <!-- Settings -->
    <div class="tab-content card p-4 mt-3" id="tab2">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Message Delay (seconds)</label>
                <input name="delay" type="number" step="0.1" class="form-control" value="12">
            </div>
            <div class="col-md-6">
                <label class="form-label">Group Switch Delay (seconds)</label>
                <input name="group_delay" type="number" class="form-control" value="3" min="2" max="10">
            </div>
        </div>
    </div>

    <!-- Live Console -->
    <div class="card p-4 mt-4">
        <h5 class="text-center mb-3">LIVE CONSOLE</h5>
        <div id="console" class="console"></div>
    </div>
</div>

<script>
function openTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById('tab'+n).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-link')[n].classList.add('active');
}
function updateStatus() {
    fetch("/status").then(r => r.json()).then(d => {
        document.getElementById("sent").innerText = d.sent;
        document.getElementById("uptime").innerText = d.uptime;
        const statusEl = document.getElementById("status");
        if (d.running) {
            statusEl.innerText = "RUNNING";
            statusEl.className = "badge bg-danger fs-3 px-5 py-3 status-running";
        } else {
            statusEl.innerText = "STOPPED";
            statusEl.className = "badge bg-secondary fs-3 px-5 py-3";
        }
        document.getElementById("console").innerHTML = d.logs.map(l => `<div>${l}</div>`).join("");
        document.getElementById("console").scrollTop = 999999;
    });
}
function startBomb() {
    const form = document.getElementById("form");
    fetch("/start", { method: "POST", body: new FormData(form) })
        .then(() => updateStatus());
}
function stopBomb() {
    fetch("/stop", { method: "POST" }).then(() => updateStatus());
}
setInterval(updateStatus, 1400);
updateStatus();
</script>
</body>
</html>
